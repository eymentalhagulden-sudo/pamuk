<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pamuk Üretiminde Robotik Sistemler ve Otomasyon İmkanları</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1f1f1f;
            line-height: 1.85;
            transition: all 0.4s ease;
        }
        body.dark { background-color: #0f0f0f; color: #e0e0e0; }
        header { background-color: #ffffff; border-bottom: 1px solid #eeeeee; padding: 22px 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 25px; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 28px; font-weight: 700; color: #1f1f1f; text-decoration: none; }
        .hero {
            height: 480px;
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
                        url('https://images.unsplash.com/photo-1594904351111-a072f80b1a71?q=80&w=1600') center/cover no-repeat;
            display: flex; align-items: center; text-align: center; color: white;
        }
        .badge { background-color: #f5f5f5; color: #2e7d32; padding: 7px 18px; border-radius: 30px; font-size: 14.5px; font-weight: 600; display: inline-block; margin-bottom: 20px; }
        article { max-width: 820px; margin: -80px auto 100px; background: #ffffff; padding: 65px 55px; border-radius: 12px; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.07); }
        .model-section { margin: 60px 0; padding: 35px; background-color: #fafafa; border-radius: 12px; border: 1px solid #eeeeee; text-align: center; }
        .model-btn { display: inline-block; padding: 14px 32px; border-radius: 8px; text-decoration: none; font-weight: 600; margin-top: 15px; background-color: #1976d2; color: white; transition: 0.3s; }
        .contact { background-color: #fafafa; padding: 40px; border-radius: 12px; text-align: center; margin: 60px 0; border: 1px solid #eeeeee; }
        .email { color: #2e7d32; font-size: 21px; font-weight: 600; text-decoration: none; }
        footer { background-color: #fafafa; text-align: center; padding: 50px 20px; border-top: 1px solid #eeeeee; }

        /* AI ASİSTAN */
        #pamuk-assistant { position: fixed; bottom: 25px; right: 25px; z-index: 9999; }
        #pamuk-assistant button { background: linear-gradient(135deg, #2e7d32, #43a047); color: white; border: none; padding: 14px 22px; border-radius: 50px; font-weight: 600; cursor: pointer; box-shadow: 0 6px 20px rgba(46,125,50,0.4); display: flex; align-items: center; gap: 8px; }
        #chat-window { display: none; position: absolute; bottom: 80px; right: 0; width: 360px; height: 520px; background: white; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.25); overflow: hidden; flex-direction: column; }
        #chat-header { background: linear-gradient(135deg, #2e7d32, #43a047); color: white; padding: 14px 18px; font-weight: 600; display: flex; justify-content: space-between; }
        #chat-messages { flex: 1; padding: 18px; overflow-y: auto; background: #f8f9fa; }
        .chat-bubble { margin-bottom: 14px; padding: 12px 16px; border-radius: 14px; max-width: 85%; font-size: 15.5px; }
        .user-bubble { background: #2e7d32; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
        .bot-bubble { background: #e8f0e8; color: #1f1f1f; margin-right: auto; border-bottom-left-radius: 4px; }
        #chat-input-area { padding: 12px; background: white; border-top: 1px solid #eee; display: flex; gap: 8px; }
        #user-input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 30px; outline: none; }
        #send-btn { background: #2e7d32; color: white; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="#" class="logo"><span>🌱</span> RoboZeka</a>
            <nav><a href="#" style="text-decoration:none; color:#333; margin-left:15px;">Ana Sayfa</a></nav>
        </div>
    </header>

    <section class="hero">
        <div class="container" style="width:100%">
            <span class="badge">TARIM TEKNOLOJİLERİ</span>
            <h1>Pamuk Üretiminde Robotik Sistemler</h1>
            <p>2026 Teknofest Projesi</p>
        </div>
    </section>

    <article class="container">
        <div class="model-section">
            <h2>İnteraktif 3D Pamuk Modeli</h2>
            <a href="https://www.meshy.ai/s/RgfiRi" target="_blank" class="model-btn">3D Modeli İncele →</a>
        </div>
        <div class="contact">
            <h2>İletişim</h2>
            <a href="mailto:eymentalha@gmail.com" class="email">eymentalha@gmail.com</a>
        </div>
    </article>

    <div id="pamuk-assistant">
        <button onclick="toggleChat()">🤖 Pamuk Asistanı</button>
        <div id="chat-window">
            <div id="chat-header"><span>🤖 Robotik Asistan</span><span onclick="toggleChat()" style="cursor:pointer; font-size:22px;">×</span></div>
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input id="user-input" type="text" placeholder="Bir şey sor...">
                <button id="send-btn" onclick="sendMessage()">↑</button>
            </div>
        </div>
    </div>

    <script>
        // Yeni API anahtarın buraya eklendi
        const GEMINI_API_KEY = "req_011CZjPftTCwfD29HchvkPrW";
        const SYSTEM_PROMPT = "Sen pamuk üretimi ve tarım robotikleri uzmanı bir asistansın.";

        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        }

        function siteyiKapat() {
            document.body.innerHTML = `
                <div style="height:100vh; background:#000; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; font-family:sans-serif; padding:20px;">
                    <h1 style="color:#e74c3c; font-size:48px; margin-bottom:20px;">SİSTEM DURDURULDU</h1>
                    <p style="font-size:20px; line-height:1.6;">"MAL EFE" komutu algılandı. Güvenlik protokolü çalıştırılıyor.</p>
                </div>`;
            setTimeout(() => { window.location.href = "about:blank"; }, 3000);
        }

        function addMessage(sender, text) {
            const messages = document.getElementById('chat-messages');
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${sender}-bubble`;
            bubble.innerHTML = text.replace(/\n/g, '<br>');
            messages.appendChild(bubble);
            messages.scrollTop = messages.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            // --- Sadece "MAL EFE" kontrolü ---
            if (msg.toUpperCase() === "MAL EFE") {
                siteyiKapat();
                return;
            }

            addMessage('user', msg);
            input.value = '';

            try {
                // Not: "req_" ile başlayan anahtarlar genelde proxy veya özel API yapılarıdır. 
                // Eğer bu standart Gemini API değilse endpoint URL'sini değiştirmen gerekebilir.
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_PROMPT + "\nSoru: " + msg }] }] })
                });
                const data = await response.json();
                const answer = data.candidates?.[0]?.content?.parts?.[0]?.text || "Şu an cevap veremiyorum.";
                addMessage('bot', answer);
            } catch (err) {
                addMessage('bot', "Hata: API bağlantısı sağlanamadı.");
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
