<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pamuk Üretiminde Robotik Sistemler ve Otomasyon İmkanları</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1f1f1f;
            line-height: 1.85;
            transition: all 0.4s ease;
        }
        body.dark {
            background-color: #0f0f0f;
            color: #e0e0e0;
        }
        body.dark header, body.dark footer, body.dark .contact, body.dark .model-section, body.dark .highlight {
            background-color: #1a1a1a;
            border-color: #333;
        }
        body.dark h1, body.dark h2, body.dark p, body.dark li { color: #e0e0e0; }
        body.dark .badge { background-color: #1a1a1a; color: #66bb6a; }
        body.dark .chat-bubble.bot-bubble { background: #2a2a2a; color: #e0e0e0; }

        header { background-color: #ffffff; border-bottom: 1px solid #eeeeee; padding: 22px 0; }
        body.dark header { background-color: #1a1a1a; border-color: #333; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 25px; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 28px; font-weight: 700; color: #1f1f1f; text-decoration: none; }
        body.dark .logo { color: #e0e0e0; }
        .logo span { font-size: 38px; }
        nav a { margin: 0 16px; text-decoration: none; color: #444444; font-weight: 500; }
        body.dark nav a { color: #bbb; }
        nav a:hover { color: #2e7d32; }

        .hero {
            height: 480px;
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
                        url('https://source.unsplash.com/random/1600x900/?cotton-field') center/cover no-repeat;
            display: flex;
            align-items: center;
            text-align: center;
            color: white;
        }
        .badge {
            background-color: #f5f5f5;
            color: #2e7d32;
            padding: 7px 18px;
            border-radius: 30px;
            font-size: 14.5px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
        }
        h1 { font-size: 48px; font-weight: 700; line-height: 1.2; margin-bottom: 20px; color: #ffffff; }
        article {
            max-width: 820px;
            margin: -80px auto 100px;
            background: #ffffff;
            padding: 65px 55px;
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.07);
        }
        body.dark article { background: #1a1a1a; box-shadow: 0 15px 50px rgba(0,0,0,0.4); }
        h2 {
            font-size: 29px;
            color: #1f1f1f;
            margin: 55px 0 22px;
            padding-bottom: 8px;
            border-bottom: 2px solid #eeeeee;
        }
        body.dark h2 { color: #e0e0e0; border-color: #444; }
        p, li { font-size: 18px; margin-bottom: 22px; color: #333333; }
        body.dark p, body.dark li { color: #ccc; }
        .highlight {
            background-color: #f9f9f9;
            padding: 28px;
            border-left: 5px solid #66bb6a;
            margin: 40px 0;
        }
        body.dark .highlight { background-color: #2a2a2a; }
        .model-section {
            margin: 60px 0;
            padding: 35px;
            background-color: #fafafa;
            border-radius: 12px;
            border: 1px solid #eeeeee;
            text-align: center;
        }
        body.dark .model-section { background-color: #1f1f1f; border-color: #444; }
        .model-btn, .download-btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        .model-btn { background-color: #1976d2; color: white; }
        .model-btn:hover { background-color: #1565c0; transform: translateY(-3px); }
        .download-btn { background-color: #2e7d32; color: white; }
        .download-btn:hover { background-color: #1b5e20; transform: translateY(-3px); }
        .contact {
            background-color: #fafafa;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            margin: 60px 0;
            border: 1px solid #eeeeee;
        }
        body.dark .contact { background-color: #1f1f1f; border-color: #444; }
        .email { color: #2e7d32; font-size: 21px; font-weight: 600; text-decoration: none; }
        footer {
            background-color: #fafafa;
            text-align: center;
            padding: 50px 20px;
            color: #666666;
            border-top: 1px solid #eeeeee;
        }
        body.dark footer { background-color: #1a1a1a; color: #888; border-color: #333; }

        .pamuk-image {
            width: 100%;
            max-height: 420px;
            object-fit: cover;
            border-radius: 12px;
            margin: 25px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        body.dark .pamuk-image { box-shadow: 0 10px 30px rgba(0,0,0,0.6); }

        /* AI Asistan */
        #pamuk-assistant {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 9999;
        }
        #pamuk-assistant button {
            background: linear-gradient(135deg, #2e7d32, #43a047);
            color: white;
            border: none;
            padding: 14px 22px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(46,125,50,0.4);
            cursor: pointer;
        }
        #chat-window {
            display: none;
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 360px;
            height: 520px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            overflow: hidden;
            flex-direction: column;
        }
        body.dark #chat-window { background: #1a1a1a; }
        #chat-header {
            background: linear-gradient(135deg, #2e7d32, #43a047);
            color: white;
            padding: 14px 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #chat-messages {
            flex: 1;
            padding: 18px;
            overflow-y: auto;
            background: #f8f9fa;
        }
        body.dark #chat-messages { background: #111; }
        .chat-bubble {
            margin-bottom: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            max-width: 85%;
            font-size: 15.5px;
        }
        .user-bubble { background: #2e7d32; color: white; margin-left: auto; }
        .bot-bubble { background: #e8f0e8; color: #1f1f1f; margin-right: auto; }
        body.dark .bot-bubble { background: #2a2a2a; color: #e0e0e0; }
        #chat-input-area {
            padding: 12px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        body.dark #chat-input-area { background: #1a1a1a; border-color: #444; }
        #user-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 30px;
            outline: none;
        }
        body.dark #user-input { background: #222; color: #eee; border-color: #555; }
        #send-btn {
            background: #2e7d32;
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
        #speak-btn {
            background: #1976d2;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- Header, Hero, Article, Footer aynı – kısalttım, sen bilirsin -->
    <header>...</header>
    <section class="hero">...</section>
    <div class="container">...</div>
    <article class="container">...</article>
    <footer>...</footer>

    <!-- AI Asistan -->
    <div id="pamuk-assistant">
        <button onclick="toggleChat()">🤖 Pamuk Asistanı</button>
        <div id="chat-window">
            <div id="chat-header">
                <span>🤖 Pamuk Robotik Asistanı</span>
                <span onclick="toggleChat()" style="cursor:pointer; font-size:22px;">×</span>
            </div>
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input id="user-input" type="text" placeholder="Pamuk robotları hakkında bir şey sor...">
                <button id="send-btn" onclick="sendMessage()">↑</button>
                <button id="speak-btn">🔊</button> <!-- Ses tuşu -->
            </div>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "AIzaSyB3IiKKGWLNL-XKZIeZMLHLPzCGSGFuWrw";

        const SYSTEM_PROMPT = `Sen pamuk üretimi, pamuk tarımı ve tarım robotikleri konusunda uzman bir Türk asistanısın. Cevaplarını dostça, anlaşılır ve Türkçe ver.`;

        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        }

        function addMessage(sender, text) {
            const messages = document.getElementById('chat-messages');
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${sender}-bubble`;
            bubble.innerHTML = text.replace(/\n/g, '<br>');
            messages.appendChild(bubble);
            messages.scrollTop = messages.scrollHeight;
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'tr-TR';
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;

                const voices = speechSynthesis.getVoices();
                const turkishVoice = voices.find(v => v.lang === 'tr-TR' || v.lang.startsWith('tr'));
                if (turkishVoice) utterance.voice = turkishVoice;

                speechSynthesis.speak(utterance);
            } else {
                console.log("Tarayıcı sesi desteklemiyor.");
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            const upper = msg.toUpperCase();
            if (upper === '!ROBO') {
                document.body.classList.toggle('dark');
                input.value = '';
                return;
            }
            if (upper === 'PO') {
                window.close();
                document.body.innerHTML = '<h1 style="text-align:center; margin-top:100px; color:#e74c3c;">Site kapatılıyor...</h1>';
                setTimeout(() => window.location.href = "about:blank", 800);
                return;
            }

            addMessage('user', msg);
            input.value = '';

            const loadingId = 'loading-' + Date.now();
            const loadingBubble = document.createElement('div');
            loadingBubble.id = loadingId;
            loadingBubble.className = 'chat-bubble bot-bubble';
            loadingBubble.innerHTML = 'Düşünüyorum<span id="dots"></span>';
            document.getElementById('chat-messages').appendChild(loadingBubble);
            document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;

            let dots = 0;
            const dotInterval = setInterval(() => {
                dots = (dots + 1) % 4;
                const dotEl = document.getElementById('dots');
                if (dotEl) dotEl.textContent = '.'.repeat(dots);
            }, 400);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n\nKullanıcı sorusu: " + msg }] }]
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || `HTTP ${response.status}`);

                let answer = data.candidates?.[0 0]?.text || "Cevap alınamadı.";

                clearInterval(dotInterval);
                document.getElementById(loadingId).remove();
                addMessage('bot', answer);
                speak(answer);  // Otomatik sesle oku!

            } catch (err) {
                clearInterval(dotInterval);
                document.getElementById(loadingId).remove();
                let errorMsg = `Hata: ${err.message}`;
                if (errorMsg.includes("quota")) errorMsg = "Kota bitti 😔 15-30 sn bekle.";
                addMessage('bot', errorMsg);
            }
        }

        // Ses tuşu: Son bot mesajını oku
        document.getElementById('speak-btn').onclick = () => {
            const lastBot = document.querySelector('.bot-bubble:last-child');
            if (lastBot) speak(lastBot.textContent);
        };

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Sesler yüklendikten sonra
        window.speechSynthesis.onvoiceschanged = () => {
            console.log("Türkçe ses yüklendi.");
        };
    </script>
</body>
</html>
